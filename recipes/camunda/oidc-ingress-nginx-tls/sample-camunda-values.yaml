# Helm chart values are imported from `../camunda-values.yaml.d` via `config.mk`.
# This file only contains additional overrides.
# Note that array values, e.g. `zeebe.env` can NOT be merged by Helm.
elasticsearch:
  enabled: true
global:
  ingress:
    enabled: true
    className: nginx
    host: "example.camunda.com"
    tls:
      enabled: true
      secretName: "tls-secret"
  security:
    authentication:
      method: oidc
  identity:
    auth:
      publicIssuerUrl: https://example.camunda.com/auth/realms/camunda-platform
      issuerBackendUrl: http://camunda-keycloak/auth/realms/camunda-platform
      authUrl: https://example.camunda.com/auth/realms/camunda-platform/protocol/openid-connect/auth
      tokenUrl: http://camunda-keycloak/auth/realms/camunda-platform/protocol/openid-connect/token
      jwksUrl: http://camunda-keycloak/auth/realms/camunda-platform/protocol/openid-connect/certs
      identity:
        redirectUrl: https://example.camunda.com/management
      orchestration:
        secret:
          existingSecret: camunda-credentials
          existingSecretKey: identity-orchestration-client-token
        redirectUrl: https://example.camunda.com/orchestration
      # Currently required by Identity even when Optimize is disabled
      optimize:
        secret:
          existingSecret: camunda-credentials
          existingSecretKey: identity-optimize-client-token
      webModeler:
        redirectUrl: https://example.camunda.com/modeler
    keycloak:
      url:
        protocol: http
        host: camunda-keycloak
        port: 80
      # contextPath defaults to /auth
      realm: /realms/camunda-platform
      auth:
        adminUser: admin
        existingSecret: "camunda-credentials"
        existingSecretKey: "identity-keycloak-admin-password"
  elasticsearch:
    enabled: true
  multitenancy:
    enabled: true
orchestration:
  gateway:
    grpc:
      enabled: true
  contextPath: "/orchestration"
  ingress:
    grpc:
      enabled: true
      host: "grpc.example.camunda.com"
      path: "/"
      tls:
        enabled: true
        secretName: "grpc-tls-secret"
  data:
    secondaryStorage:
      type: elasticsearch
  multitenancy:
    checks:
      enabled: true
    api:
      enabled: true
prometheusServiceMonitor:
  enabled: true
connectors:
  enabled: true
  security:
    authentication:
      method: oidc
      oidc:
        secret:
          existingSecret: camunda-credentials
          existingSecretKey: identity-connectors-client-token
identity:
  enabled: true
  contextPath: /management
  fullURL: https://example.camunda.com/management
  firstUser:
    secret:
      existingSecret: "camunda-credentials"
      existingSecretKey: "identity-first-user-password"
  env:
    - name: KEYCLOAK_REALM
      value: camunda-platform
  multitenancy:
    enabled: true
identityPostgresql:
  enabled: true
  auth:
    existingSecret: camunda-credentials
# Keycloak will be installed and will use internally provisioned PostgreSQL database
identityKeycloak:
  enabled: true
  postgresql:
    auth:
      existingSecret: camunda-credentials
      # Override default key names so Keycloak's internal PostgreSQL
      # shares the same secret keys as identityPostgresql:
      secretKeys:
        adminPasswordKey: identity-postgresql-admin-password
        userPasswordKey: identity-postgresql-user-password
webModeler:
  contextPath: /modeler
  enabled: true
  restapi:
    mail:
      # This value is required, otherwise the restapi pod wouldn't start.
      fromAddress: noreply@example.com
    env:
      - name: CAMUNDA_MODELER_CLUSTERS_0_ID
        value: "camunda-demo-cluster"
      - name: CAMUNDA_MODELER_CLUSTERS_0_NAME
        value: "Camunda Demo Cluster"
      - name: CAMUNDA_MODELER_CLUSTERS_0_VERSION
        value: "8.9.0"
      - name: CAMUNDA_MODELER_CLUSTERS_0_AUTHENTICATION
        value: "BEARER_TOKEN"
      - name: CAMUNDA_MODELER_CLUSTERS_0_URL_GRPC
        value: "grpc://camunda-zeebe-gateway:26500"
      - name: CAMUNDA_MODELER_CLUSTERS_0_URL_REST
        value: "http://camunda-zeebe-gateway"
      - name: CAMUNDA_MODELER_CLUSTERS_0_URL_WEBAPP
        value: "http://camunda-zeebe/orchestration"
      - name: CAMUNDA_MODELER_CLUSTERS_0_AUTHORIZATIONS_ENABLED
        value: "true"
      - name: LOGGING_LEVEL_IO_GRPC
        value: "TRACE"
      - name: LOGGING_LEVEL_IO_CAMUNDA_MODELER
        value: "DEBUG"
      - name: SPRING_PROFILES_INCLUDE
        value: "default-logging"
webModelerPostgresql:
  enabled: true
  auth:
    existingSecret: "camunda-credentials"
    secretKeys:
      adminPasswordKey: webmodeler-postgresql-admin-password
      userPasswordKey: webmodeler-postgresql-user-password

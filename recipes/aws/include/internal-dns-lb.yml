# Internal DNS Load Balancer
# Exposes kube-dns via an internal NLB so the remote cluster can forward DNS queries.
#
# NOTE: AWS NLBs (legacy cloud provider) do not support mixed TCP/UDP on the same port.
# We only expose TCP since the CoreDNS forwarding config uses force_tcp.
#
# Source: adapted from https://github.com/camunda/c8-multi-region
---
apiVersion: v1
kind: Service
metadata:
  name: kube-dns-lb
  namespace: kube-system
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-internal: "true"
    service.beta.kubernetes.io/aws-load-balancer-type: nlb
spec:
  type: LoadBalancer
  selector:
    k8s-app: kube-dns
  ports:
    - name: dns-tcp
      port: 53
      protocol: TCP
      targetPort: 53
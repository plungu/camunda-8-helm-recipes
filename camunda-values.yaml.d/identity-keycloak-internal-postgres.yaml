# Identity + Keycloak with internally provisioned PostgreSQL
# Combine with oidc.yaml for OIDC authentication.
# Mutually exclusive with identity-keycloak-external-postgres.yaml.
#
# Defaults already provide:
#   identity.externalDatabase.enabled: false # only needed for resource authorization, multi-tenancy, or an external identity provider (IdP)
#   identityPostgresql.auth.username: identity
#   identityPostgresql.auth.database: identity
#   identityPostgresql.auth.secretKeys.adminPasswordKey: identity-postgresql-admin-password
#   identityPostgresql.auth.secretKeys.userPasswordKey: identity-postgresql-user-password
#   identityKeycloak.auth.existingSecret: camunda-credentials
#   identityKeycloak.auth.passwordSecretKey: identity-keycloak-admin-password

identity:
  enabled: true
  contextPath: /management
  fullURL: <IDENTITY_EXT_URL>/management
  firstUser:
    secret:
      existingSecret: "camunda-credentials"
      existingSecretKey: "identity-first-user-password"
  env:
    - name: KEYCLOAK_REALM
      value: <KEYCLOAK_REALM>

identityPostgresql:
  enabled: true
  auth:
    existingSecret: camunda-credentials

# Keycloak will be installed and will use internally provisioned PostgreSQL database
identityKeycloak:
  enabled: true
  postgresql:
    auth:
      existingSecret: camunda-credentials
      # Override default key names so Keycloak's internal PostgreSQL
      # shares the same secret keys as identityPostgresql:
      secretKeys:
        adminPasswordKey: identity-postgresql-admin-password
        userPasswordKey: identity-postgresql-user-password